name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/fashionconnect"
  DIRECT_DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/fashionconnect"
  NEXTAUTH_SECRET: "ci-placeholder-secret-not-used-in-tests"

jobs:
  quality:
    name: Lint & Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Check build compiles
        run: npx next build
        env:
          # Minimal env vars needed for build
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ env.DIRECT_DATABASE_URL }}
          CLOUDINARY_CLOUD_NAME: "placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
